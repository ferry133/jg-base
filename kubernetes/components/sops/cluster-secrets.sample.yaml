---
# cluster-secrets.sample.yaml
# Copy to cluster-secrets.sops.yaml, fill in values, then encrypt with:
#   sops --encrypt --in-place cluster-secrets.sops.yaml
#
# Required by: base (all clusters)
# Optional vars are marked with the extras that need them.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-secrets
stringData:
  # ── Base (required for all clusters) ──────────────────────────────────────
  SECRET_DOMAIN: "example.com"            # cluster's primary domain

  # Cloudflare
  CLOUDFLARE_TOKEN: ""                    # API token (DNS edit permission)

  # Cluster network
  CLUSTER_API_ADDR: "10.x.x.x"           # Talos API / k8s API endpoint IP
  CLUSTER_GATEWAY_ADDR: "10.x.x.x"       # envoy-external LoadBalancer IP
  CLUSTER_DNS_GATEWAY_ADDR: "10.x.x.x"   # k8s-gateway (DNS) LoadBalancer IP

  # ── extras/storage/nfs-subdir ─────────────────────────────────────────────
  NAS_SERVER: "10.x.x.x"                 # NFS server IP
  NAS_PATH: "/volume/path"               # NFS export path for storage provisioner

  # ── extras/claude-code ────────────────────────────────────────────────────
  NAS_CODING_PATH: "/volume/coding"      # NFS export path for coding workspace
  TTYD_CREDENTIAL: "user:password"       # ttyd basic auth (user:password)
  CLAUDE_CODE_DATABASE_URL: ""           # optional: PostgreSQL DSN for MCP memory server
                                         # e.g. postgresql://user:pass@host/dbname
                                         # leave empty to disable DB-backed memory
