---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
  interval: 1h
  values:
    # tunnel/VXLAN mode (not native) so the cluster works across subnets and is
    # compatible with Talos KubeSpan. autoDirectNodeRoutes installs direct routes
    # that assume all nodes share one L2 segment → must be false for cross-subnet.
    autoDirectNodeRoutes: false
    bpf:
      masquerade: true
      # Ref: https://github.com/siderolabs/talos/issues/10002
      hostLegacyRouting: true
    cni:
      # Required for pairing with Multus CNI
      exclusive: false
    cgroup:
      automount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    # NOTE: devices might need to be set if you have more than one active NIC on your hosts
    # devices: eno+ eth+
    dashboards:
      enabled: true
    endpointRoutes:
      enabled: true
    envoy:
      enabled: false
    gatewayAPI:
      enabled: false
    hubble:
      enabled: false
    ipam:
      mode: kubernetes
    # ipv4NativeRoutingCIDR removed — only used in native routing mode (now tunnel).
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    l2announcements:
      enabled: true
    loadBalancer:
      algorithm: maglev
      # snat (was dsr): Cilium DSR is NOT supported with vxlan tunnel mode (DSR over
      # tunneling needs geneve + dsrDispatch). snat is the compatible choice.
      # Trade-off: LoadBalancer services no longer preserve the client source IP at L4.
      mode: "snat"
    localRedirectPolicies:
      enabled: true
    operator:
      dashboards:
        enabled: true
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
      replicas: 1
      rollOutPods: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
    rollOutCiliumPods: true
    routingMode: tunnel
    tunnelProtocol: vxlan
    # MTU headroom: VXLAN (50B) rides over KubeSpan WireGuard (1420 = 1500-80):
    # 1420 - 50 = 1370. Conservative; also safe on clusters not (yet) using KubeSpan.
    MTU: 1370
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    socketLB:
      enabled: true
      hostNamespaceOnly: true
