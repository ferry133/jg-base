---
apiVersion: v1
kind: Secret
metadata:
  name: claude-code-secret
  namespace: claudecode
stringData:
  TTYD_CREDENTIAL: "${TTYD_CREDENTIAL}"
  # Phase 2: MCP Memory Server — set to enable DB-backed long-term memory
  # Leave empty to disable (entrypoint.sh checks if non-empty before injecting MCP config)
  DATABASE_URL: "${CLAUDE_CODE_DATABASE_URL:-}"
