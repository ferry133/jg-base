---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: claude-code
  namespace: claudecode
spec:
  chartRef:
    kind: OCIRepository
    name: claude-code
  interval: 1h
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/ferry133/claude-code
              tag: 8328b34
            envFrom:
              - secretRef:
                  name: claude-code-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 7681
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: false
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_RAW"] # nmap/masscan/arp-scan/tcpdump/fping raw sockets
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000

    podLabels:
      hostnetwork-group: claude-code

    # hostNetwork pods all bind :7681 on the node -- hard-require spreading
    # across nodes so this and any claude-code/cc instance never collide.
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                hostnetwork-group: claude-code
            topologyKey: kubernetes.io/hostname

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["claude-code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      # Phase 1: PVC — auto-memory 重建容器後保留
      claude-config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /home/claude/.claude
      # coding workspace from NAS
      workspace:
        type: nfs
        server: "${NAS_SERVER}"
        path: "${NAS_CODING_PATH}"
        globalMounts:
          - path: /home/claude/workspace
