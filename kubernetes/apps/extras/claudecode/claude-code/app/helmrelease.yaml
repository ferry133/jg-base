---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: claude-code
  namespace: claudecode
spec:
  chartRef:
    kind: OCIRepository
    name: claude-code
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/ferry133/claude-code
              tag: latest
            envFrom:
              - secretRef:
                  name: claude-code-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 7681
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: false
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames: ["claude-code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      # Phase 1: PVC — auto-memory 重建容器後保留
      claude-config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /home/claude/.claude
      # coding workspace from NAS
      workspace:
        type: nfs
        server: "${NAS_SERVER}"
        path: "${NAS_CODING_PATH}"
        globalMounts:
          - path: /home/claude/workspace
