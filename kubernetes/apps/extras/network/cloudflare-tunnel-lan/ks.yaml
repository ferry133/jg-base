---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-tunnel-lan
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/extras/network/cloudflare-tunnel-lan/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: jg-base
    namespace: flux-system
  targetNamespace: network
  wait: false
