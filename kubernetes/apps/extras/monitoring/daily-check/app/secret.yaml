---
apiVersion: v1
kind: Secret
metadata:
  name: daily-check-config
  namespace: monitoring
stringData:
  CLUSTER_NAME: "${CLUSTER_NAME}"
  SMTP_HOST: "${DAILY_CHECK_SMTP_HOST}"
  SMTP_PORT: "${DAILY_CHECK_SMTP_PORT}"
  SMTP_USERNAME: "${DAILY_CHECK_SMTP_USERNAME}"
  SMTP_PASSWORD: "${DAILY_CHECK_SMTP_PASSWORD}"
  SMTP_FROM: "${DAILY_CHECK_SMTP_FROM}"
  NOTIFY_EMAIL_TO: "${DAILY_CHECK_NOTIFY_EMAIL_TO}"
  HEALTHCHECKS_PING_URL: "${DAILY_CHECK_HEALTHCHECKS_PING_URL}"
  NAS_SERVER: "${NAS_SERVER}"
  ENDPOINTS_TO_PROBE: "${DAILY_CHECK_ENDPOINTS}"
