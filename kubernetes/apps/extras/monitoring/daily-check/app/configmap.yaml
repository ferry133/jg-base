---
apiVersion: v1
kind: ConfigMap
metadata:
  name: daily-check-script
  namespace: monitoring
data:
  msmtprc.template: |
    defaults
    auth           on
    tls            on
    tls_trust_file /etc/ssl/certs/ca-certificates.crt
    logfile        -

    account        gmail
    host           __SMTP_HOST__
    port           __SMTP_PORT__
    from           __SMTP_FROM__
    user           __SMTP_USERNAME__
    password       __SMTP_PASSWORD__

    account default : gmail

  run-check.sh: |
    #!/bin/bash
    # Production daily health check for a single cluster.
    # Reads config from env vars (sourced from daily-check-config Secret).
    # Outputs an email and pings healthchecks.io.
    set -uo pipefail

    : "${CLUSTER_NAME:?required}"
    : "${SMTP_HOST:?required}"
    : "${SMTP_PORT:?required}"
    : "${SMTP_USERNAME:?required}"
    : "${SMTP_PASSWORD:?required}"
    : "${SMTP_FROM:?required}"
    : "${NOTIFY_EMAIL_TO:?required}"
    NAS_SERVER="${NAS_SERVER:-}"
    HEALTHCHECKS_PING_URL="${HEALTHCHECKS_PING_URL:-}"
    ENDPOINTS_TO_PROBE="${ENDPOINTS_TO_PROBE:-}"

    echo "==> Installing tools"
    apk add --no-cache --quiet bash curl jq msmtp ca-certificates bind-tools openssl coreutils >/dev/null
    K8S_VERSION=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
    curl -fsSL "https://dl.k8s.io/release/${K8S_VERSION}/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
    chmod +x /usr/local/bin/kubectl

    echo "==> Configuring msmtp"
    mkdir -p /tmp/msmtp
    sed \
      -e "s|__SMTP_HOST__|${SMTP_HOST}|g" \
      -e "s|__SMTP_PORT__|${SMTP_PORT}|g" \
      -e "s|__SMTP_FROM__|${SMTP_FROM}|g" \
      -e "s|__SMTP_USERNAME__|${SMTP_USERNAME}|g" \
      -e "s|__SMTP_PASSWORD__|${SMTP_PASSWORD}|g" \
      /scripts/msmtprc.template > /tmp/msmtp/msmtprc
    chmod 600 /tmp/msmtp/msmtprc

    echo "==> Running checks"
    DATE_LOCAL=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M %Z')
    declare -a SUMMARY=()
    declare -a DETAILS=()
    FAIL_COUNT=0
    WARN_COUNT=0

    record() {
      local level="$1" name="$2" msg="${3:-}"
      case "$level" in
        ok)   SUMMARY+=("✅ ${name}") ;;
        warn) SUMMARY+=("⚠️ ${name} — ${msg}"); DETAILS+=("[WARN] ${name}: ${msg}"); ((WARN_COUNT++)) ;;
        fail) SUMMARY+=("❌ ${name} — ${msg}"); DETAILS+=("[FAIL] ${name}: ${msg}"); ((FAIL_COUNT++)) ;;
      esac
    }

    # 1. Nodes Ready
    NOT_READY=$(kubectl get nodes --no-headers 2>&1 | awk '$2 != "Ready" {print $1}')
    if [[ -z "$NOT_READY" ]]; then
      record ok "Nodes Ready"
    else
      record fail "Nodes Ready" "Not Ready: $(echo "$NOT_READY" | tr '\n' ' ')"
    fi

    # 2. Flux Kustomizations
    BAD_KS=$(kubectl get kustomization -A -o json 2>/dev/null | \
      jq -r '.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status!="True")) | "\(.metadata.namespace)/\(.metadata.name)"')
    if [[ -z "$BAD_KS" ]]; then
      record ok "Flux Kustomizations all Ready"
    else
      record fail "Flux Kustomizations" "Not Ready: $(echo "$BAD_KS" | tr '\n' ' ')"
    fi

    # 3. HelmReleases
    BAD_HR=$(kubectl get hr -A -o json 2>/dev/null | \
      jq -r '.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status!="True")) | "\(.metadata.namespace)/\(.metadata.name)"')
    if [[ -z "$BAD_HR" ]]; then
      record ok "HelmReleases all Ready"
    else
      record fail "HelmReleases" "Not Ready: $(echo "$BAD_HR" | tr '\n' ' ')"
    fi

    # 4. Pod restarts (>5 in last 24h) and abnormal pods
    ABNORMAL_PODS=$(kubectl get pods -A --no-headers 2>/dev/null | \
      awk '$4 != "Running" && $4 != "Completed" && $4 != "Succeeded" {print $1"/"$2" ("$4")"}' | head -20)
    if [[ -z "$ABNORMAL_PODS" ]]; then
      record ok "Pods all healthy"
    else
      record fail "Pods abnormal" "$(echo "$ABNORMAL_PODS" | head -10 | tr '\n' '; ')"
    fi

    # Pods with high restart count (using start time as proxy for 24h)
    HIGH_RESTART=$(kubectl get pods -A -o json 2>/dev/null | jq -r '
      .items[] |
      select(.status.containerStatuses != null) |
      . as $p |
      ($p.status.containerStatuses | map(.restartCount) | add) as $total |
      select($total > 5) |
      "\($p.metadata.namespace)/\($p.metadata.name): \($total) restarts"' | head -10)
    if [[ -z "$HIGH_RESTART" ]]; then
      record ok "No pods with excessive restarts"
    else
      record warn "Pods with >5 restarts (lifetime)" "$(echo "$HIGH_RESTART" | tr '\n' '; ')"
    fi

    # 5. PVCs all Bound
    BAD_PVC=$(kubectl get pvc -A --no-headers 2>/dev/null | awk '$3 != "Bound" {print $1"/"$2" ("$3")"}')
    if [[ -z "$BAD_PVC" ]]; then
      record ok "PVCs all Bound"
    else
      record fail "PVCs" "$(echo "$BAD_PVC" | tr '\n' '; ')"
    fi

    # 6. Postgres backup CronJob
    if kubectl -n db get cronjob postgres-backup >/dev/null 2>&1; then
      LAST_BACKUP_JOB=$(kubectl -n db get jobs --sort-by=.metadata.creationTimestamp -o json 2>/dev/null | \
        jq -r '[.items[] | select(.metadata.name | startswith("postgres-backup-"))] | last')
      LAST_STATUS=$(echo "$LAST_BACKUP_JOB" | jq -r '.status.conditions[0].type // "Unknown"')
      LAST_TIME=$(echo "$LAST_BACKUP_JOB" | jq -r '.metadata.creationTimestamp // "never"')
      if [[ "$LAST_STATUS" == "Complete" ]]; then
        record ok "Postgres backup (last: ${LAST_TIME})"
      else
        record fail "Postgres backup" "Last job status: ${LAST_STATUS}, time: ${LAST_TIME}"
      fi
    else
      record ok "Postgres backup (CronJob not deployed)"
    fi

    # 7. Postgres pod
    if kubectl -n db get deploy postgres >/dev/null 2>&1; then
      PG_READY=$(kubectl -n db get deploy postgres -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
      if [[ "$PG_READY" == "1" ]]; then
        record ok "Postgres pod Ready"
      else
        record fail "Postgres pod" "ReadyReplicas=${PG_READY:-0}"
      fi
    fi

    # 8. TLS certificates nearing expiry (14 days)
    CERT_ISSUES=$(kubectl get certificate -A -o json 2>/dev/null | jq -r '
      .items[] |
      select(.status.notAfter != null) |
      .status.notAfter as $exp |
      ($exp | fromdate) as $expEpoch |
      (now + (14 * 86400)) as $threshold |
      select($expEpoch < $threshold) |
      "\(.metadata.namespace)/\(.metadata.name) expires \($exp)"')
    if [[ -z "$CERT_ISSUES" ]]; then
      record ok "TLS certificates (>14d remaining)"
    else
      record warn "TLS certificates nearing expiry" "$(echo "$CERT_ISSUES" | tr '\n' '; ')"
    fi

    # 9. Warning events in last 1h (limited window since events default TTL is 1h)
    WARN_EVENTS=$(kubectl get events -A --field-selector type=Warning --no-headers 2>/dev/null | wc -l)
    if [[ "$WARN_EVENTS" -le 20 ]]; then
      record ok "Warning events in last hour: ${WARN_EVENTS}"
    else
      TOP_WARNS=$(kubectl get events -A --field-selector type=Warning --no-headers 2>/dev/null | \
        awk '{print $4}' | sort | uniq -c | sort -rn | head -5 | tr '\n' '; ')
      record warn "Warning events spiked (${WARN_EVENTS})" "Top reasons: ${TOP_WARNS}"
    fi

    # 10. Cloudflare tunnel pods
    TUNNEL_BAD=$(kubectl get pod -A -l app.kubernetes.io/name=cloudflare-tunnel --no-headers 2>/dev/null | \
      awk '$4 != "Running" {print $1"/"$2" ("$4")"}')
    if [[ -z "$TUNNEL_BAD" ]]; then
      record ok "Cloudflare tunnel pods Running"
    else
      record fail "Cloudflare tunnel pods" "$(echo "$TUNNEL_BAD" | tr '\n' '; ')"
    fi

    # 11. HTTPS endpoint probes
    if [[ -n "$ENDPOINTS_TO_PROBE" ]]; then
      ENDPOINT_FAILS=()
      for url in $ENDPOINTS_TO_PROBE; do
        code=$(curl -ksI -o /dev/null -w '%{http_code}' --max-time 10 "$url" || echo "000")
        if [[ "$code" =~ ^(2|3) ]]; then
          : # OK
        else
          ENDPOINT_FAILS+=("$url=$code")
        fi
      done
      if [[ ${#ENDPOINT_FAILS[@]} -eq 0 ]]; then
        record ok "External endpoints OK"
      else
        record fail "External endpoints" "$(printf '%s; ' "${ENDPOINT_FAILS[@]}")"
      fi
    fi

    # 12. NAS connectivity (ICMP via in-cluster shell — only check DNS resolution since ICMP often blocked)
    if [[ -n "$NAS_SERVER" ]]; then
      if curl -ksS --connect-timeout 5 "https://${NAS_SERVER}:5001/" -o /dev/null 2>&1 || \
         nc -zw5 "$NAS_SERVER" 2049 2>/dev/null; then
        record ok "NAS ${NAS_SERVER} reachable"
      else
        record fail "NAS ${NAS_SERVER}" "Not reachable on port 2049/5001"
      fi
    fi

    # 13. Node resource usage
    if kubectl top nodes >/dev/null 2>&1; then
      NODE_PRESSURE=$(kubectl top nodes --no-headers 2>/dev/null | \
        awk '{
          cpu = $3+0; mem = $5+0;
          if (cpu > 80) printf "%s CPU=%s%% ", $1, $3;
          if (mem > 85) printf "%s MEM=%s%% ", $1, $5;
        }')
      if [[ -z "$NODE_PRESSURE" ]]; then
        record ok "Node resource pressure normal"
      else
        record warn "Node resource pressure" "$NODE_PRESSURE"
      fi
    fi

    # 14. Node disk pressure (via Conditions)
    DISK_PRESSURE=$(kubectl get nodes -o json 2>/dev/null | jq -r '
      .items[] | .metadata.name as $n |
      .status.conditions[] | select(.type=="DiskPressure" and .status=="True") | $n')
    if [[ -z "$DISK_PRESSURE" ]]; then
      record ok "Node disk pressure clear"
    else
      record fail "Node DiskPressure" "$(echo "$DISK_PRESSURE" | tr '\n' ' ')"
    fi

    # 15. GitRepository sources
    BAD_GIT=$(kubectl get gitrepository -A -o json 2>/dev/null | \
      jq -r '.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status!="True")) | "\(.metadata.namespace)/\(.metadata.name)"')
    if [[ -z "$BAD_GIT" ]]; then
      record ok "Flux GitRepository sources Ready"
    else
      record fail "Flux GitRepository sources" "$(echo "$BAD_GIT" | tr '\n' ' ')"
    fi

    echo "==> Compiling report"
    if [[ $FAIL_COUNT -gt 0 ]]; then
      STATUS_TAG="❌ ${FAIL_COUNT} FAIL"
      [[ $WARN_COUNT -gt 0 ]] && STATUS_TAG="${STATUS_TAG}, ${WARN_COUNT} WARN"
    elif [[ $WARN_COUNT -gt 0 ]]; then
      STATUS_TAG="⚠️ ${WARN_COUNT} WARN"
    else
      STATUS_TAG="✅ OK"
    fi
    SUBJECT="[${CLUSTER_NAME}] Daily Health Check — ${DATE_LOCAL%% *} ${STATUS_TAG}"

    BODY_FILE=$(mktemp)
    {
      echo "From: ${SMTP_FROM}"
      echo "To: ${NOTIFY_EMAIL_TO}"
      echo "Subject: ${SUBJECT}"
      echo "Content-Type: text/plain; charset=UTF-8"
      echo "MIME-Version: 1.0"
      echo ""
      echo "Cluster:  ${CLUSTER_NAME}"
      echo "Time:     ${DATE_LOCAL}"
      echo "Result:   ${STATUS_TAG}"
      echo "Counts:   ${FAIL_COUNT} FAIL, ${WARN_COUNT} WARN, $((${#SUMMARY[@]} - FAIL_COUNT - WARN_COUNT)) OK"
      echo
      echo "=== Summary ==="
      for line in "${SUMMARY[@]}"; do
        echo "  $line"
      done
      if [[ ${#DETAILS[@]} -gt 0 ]]; then
        echo
        echo "=== Issue Details ==="
        for line in "${DETAILS[@]}"; do
          echo "  $line"
        done
      fi
      echo
      echo "-- "
      echo "daily-check from cluster ${CLUSTER_NAME}"
    } > "$BODY_FILE"

    echo "==> Sending email to ${NOTIFY_EMAIL_TO}"
    IFS=',' read -ra RECIPIENTS <<< "$NOTIFY_EMAIL_TO"
    if msmtp --file=/tmp/msmtp/msmtprc "${RECIPIENTS[@]/#/ }" < "$BODY_FILE"; then
      echo "Email sent successfully."
    else
      echo "WARNING: msmtp returned non-zero. Email may not have been delivered." >&2
    fi

    echo "==> Pinging healthchecks.io"
    if [[ -n "$HEALTHCHECKS_PING_URL" ]]; then
      if [[ $FAIL_COUNT -gt 0 ]]; then
        curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_PING_URL}/fail" -o /dev/null && echo "Pinged /fail" || echo "Ping to /fail failed" >&2
      else
        curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_PING_URL}" -o /dev/null && echo "Ping OK" || echo "Ping failed" >&2
      fi
    else
      echo "HEALTHCHECKS_PING_URL not set, skipping ping"
    fi

    echo "==> Done. Exit FAIL_COUNT=${FAIL_COUNT}"
    # Always exit 0 — failures are reported via email, not via job status
    exit 0
