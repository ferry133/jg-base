---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: freepbx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freepbx-secret
                  key: mysql-root-password
            - name: MYSQL_USER
              value: asterisk
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freepbx-secret
                  key: mysql-password
            - name: MYSQL_DATABASE
              value: asterisk
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: freepbx
spec:
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
