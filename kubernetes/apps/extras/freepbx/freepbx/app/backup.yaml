---
# NFS PV/PVC — NAS backup share (separate from the live-DB sc-nas share, so it
# can be ShareSync'd offsite without two-way-syncing live DB files).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: freepbx-mariadb-backup-nas
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: ${NAS_SERVER}
    path: /volume2/backup1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-backup-nas
  namespace: freepbx
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 50Gi
  volumeName: freepbx-mariadb-backup-nas
---
# CronJob — daily mariadb-dump at 03:00 UTC+8 (19:00 UTC), retain 14 days
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
  namespace: freepbx
spec:
  schedule: "0 19 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: mariadb:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  DEST="/backup/${CLUSTER_NAME}-freepbx-mariadb"
                  FILENAME="freepbx-$(date +%Y%m%d).sql.gz"
                  mkdir -p "$DEST"
                  # Dump to a temp file first so a failed mariadb-dump (set -e)
                  # aborts the job instead of silently producing an empty .gz.
                  # Compress to .partial then atomically rename.
                  TMP="$(mktemp)"
                  trap 'rm -f "$TMP"' EXIT
                  mariadb-dump -h "$DBHOST" -u root -p"$MYSQL_ROOT_PASSWORD" \
                    --single-transaction --routines --triggers --events \
                    --databases asterisk > "$TMP"
                  [ -s "$TMP" ]
                  gzip -c "$TMP" > "$DEST/$FILENAME.partial"
                  mv "$DEST/$FILENAME.partial" "$DEST/$FILENAME"
                  echo "Backup written: $DEST/$FILENAME ($(du -sh $DEST/$FILENAME | cut -f1))"
                  # Retain last 14 days
                  find "$DEST" -name "freepbx-*.sql.gz" -mtime +14 -delete
                  echo "Cleanup done. Files kept:"
                  ls -lh "$DEST"
              env:
                - name: DBHOST
                  value: mariadb.freepbx.svc
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: freepbx-secret
                      key: mysql-root-password
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: mariadb-backup-nas
