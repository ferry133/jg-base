---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freepbx
  namespace: freepbx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freepbx
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: freepbx
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        # 等外部 mariadb 真的可連、且 asterisk DB/帳號就緒，才放行主容器。
        # 否則 freepbx 的 10-freepbx init 會比 mariadb 先跑、連不到 DB 而中止安裝，
        # 留下一個空的 asterisk 資料庫 → Asterisk 沒有設定 → SIP 5060 不會監聽。
        - name: wait-for-mariadb
          image: mariadb:latest
          # mariadb image 已在節點 cache；registry mirror (10.9.8.10:29999) 目前不穩，
          # 用 IfNotPresent 取用 cache、不依賴 mirror。
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for mariadb at $DBHOST:$DBPORT (db=$DBNAME)..."
              until mariadb -h"$DBHOST" -P"$DBPORT" -u"$DBUSER" -p"$DBPASS" "$DBNAME" -e "SELECT 1" >/dev/null 2>&1; do
                echo "  mariadb not ready, retrying in 3s..."
                sleep 3
              done
              echo "mariadb is ready."
          env:
            - name: DBHOST
              value: "mariadb.freepbx.svc.cluster.local"
            - name: DBPORT
              value: "3306"
            - name: DBUSER
              value: "asterisk"
            - name: DBNAME
              value: "asterisk"
            - name: DBPASS
              valueFrom:
                secretKeyRef:
                  name: freepbx-secret
                  key: mysql-password
      containers:
        - name: freepbx
          # digest-pin（節點已 cache 此 digest）+ IfNotPresent：registry mirror
          # (10.9.8.10:29999) 目前不穩，避免重啟時依賴 mirror 重拉而 ErrImagePull。
          image: tiredofit/freepbx:latest@sha256:8c914c97c8307b87e383af620e6ff993de87a63e5214461ee350a01760d58e2d
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Asia/Taipei"
            - name: TIMEZONE
              value: "Asia/Taipei"
            - name: DBHOST
              value: "mariadb.freepbx.svc.cluster.local"
            - name: DBUSER
              value: "asterisk"
            - name: DB_USER
              value: "asterisk"
            - name: DBNAME
              value: "asterisk"
            - name: DBPORT
              value: "3306"
            - name: DBENGINE
              value: "mysql"
            - name: CDRDBNAME
              value: "asteriskcdrdb"
            - name: RTP_START
              value: "18000"
            - name: RTP_FINISH
              value: "20000"
            - name: DEBUG_MODE
              value: "FALSE"
            - name: ENABLE_CRON
              value: "FALSE"
            - name: ENABLE_SMTP
              value: "FALSE"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: freepbx-secret
                  key: mysql-password
            - name: DBPASS
              valueFrom:
                secretKeyRef:
                  name: freepbx-secret
                  key: mysql-password
          ports:
            - containerPort: 80
              name: http
            - containerPort: 5060
              protocol: UDP
              name: sip-udp
            - containerPort: 5060
              protocol: TCP
              name: sip-tcp
            - containerPort: 4569
              protocol: UDP
              name: iax2
            # RTP 18000-20000/udp: hostNetwork 直接 bind，不需列舉
          volumeMounts:
            - name: etc
              mountPath: /etc/asterisk
            - name: var
              mountPath: /var/lib/asterisk
            - name: www
              mountPath: /var/www/html
            - name: data
              mountPath: /data
            - name: log
              mountPath: /var/log/asterisk
            - name: certs
              mountPath: /etc/apache2/certs
            - name: usr
              mountPath: /usr/lib64/asterisk
      volumes:
        - name: etc
          persistentVolumeClaim:
            claimName: freepbx-etc
        - name: var
          persistentVolumeClaim:
            claimName: freepbx-var
        - name: www
          persistentVolumeClaim:
            claimName: freepbx-www
        - name: data
          persistentVolumeClaim:
            claimName: freepbx-data
        - name: log
          persistentVolumeClaim:
            claimName: freepbx-log
        - name: certs
          persistentVolumeClaim:
            claimName: freepbx-certs
        - name: usr
          persistentVolumeClaim:
            claimName: freepbx-usr
---
apiVersion: v1
kind: Service
metadata:
  name: freepbx-web
  namespace: freepbx
spec:
  selector:
    app: freepbx
  ports:
    - name: http
      port: 80
      targetPort: 80
