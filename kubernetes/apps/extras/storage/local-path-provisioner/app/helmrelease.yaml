---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: storage
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: local-path-provisioner
      version: "0.0.30"
      sourceRef:
        kind: HelmRepository
        name: local-path-provisioner
        namespace: storage
      interval: 5m
  values:
    storageClass:
      create: true
      name: local-path
    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/local-path-provisioner
