---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: local-path-provisioner
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/extras/storage/local-path-provisioner/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: jg-base
    namespace: flux-system
  targetNamespace: storage
  wait: true
