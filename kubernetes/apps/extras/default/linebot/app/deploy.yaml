---
# LINE Gateway — 驗簽 + MQTT publish + LINE Push API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: line-gateway
  namespace: linebot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: line-gateway
  template:
    metadata:
      labels:
        app: line-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/ferry133/linebot:latest
          command: ["python", "/app/gateway/line_gateway.py"]
          ports:
            - containerPort: 8080
          env:
            - name: MQTT_HOST
              value: mosquitto.mqtt.svc.cluster.local
          envFrom:
            - secretRef:
                name: linebot-secret
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: line-gateway
  namespace: linebot
spec:
  selector:
    app: line-gateway
  ports:
    - port: 8080
      targetPort: 8080
