---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trello-notifier
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/extras/default/trello-notifier/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: jg-base
    namespace: flux-system
  targetNamespace: default
  wait: false
