---
apiVersion: batch/v1
kind: CronJob
metadata:
  namespace: linebot
  name: trello-notifier-morning
spec:
  schedule: "0 9 * * 1-6"
  timeZone: "Asia/Taipei"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: notifier
              image: ghcr.io/ferry133/linebot:a0cf6fd
              imagePullPolicy: Always
              command: ["python", "/app/trello_line_notifier.py"]
              args: ["morning"]
              envFrom:
                - secretRef:
                    name: linebot-secret
              volumeMounts:
                - name: knowledge
                  mountPath: /app/knowledge
                  readOnly: true
          volumes:
            - name: knowledge
              persistentVolumeClaim:
                claimName: linebot-knowledge-nas
