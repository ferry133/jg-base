---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-migrations
  namespace: db
data:
  001_init.sql: |
    CREATE TABLE IF NOT EXISTS episodes (
        id           SERIAL PRIMARY KEY,
        agent_id     TEXT NOT NULL,
        situation    TEXT NOT NULL,
        action       TEXT NOT NULL,
        result       TEXT NOT NULL,
        quality      FLOAT NOT NULL,
        created_at   TIMESTAMPTZ DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS episodes_agent_time_idx ON episodes (agent_id, created_at DESC);

    CREATE TABLE IF NOT EXISTS knowledge (
        id           SERIAL PRIMARY KEY,
        agent_id     TEXT NOT NULL,
        fact         TEXT NOT NULL,
        confidence   FLOAT NOT NULL DEFAULT 0.5,
        source_count INTEGER NOT NULL DEFAULT 1,
        updated_at   TIMESTAMPTZ DEFAULT now(),
        UNIQUE (agent_id, fact)
    );

    CREATE TABLE IF NOT EXISTS working_memory (
        id           SERIAL PRIMARY KEY,
        agent_id     TEXT NOT NULL,
        thread_id    TEXT NOT NULL,
        messages     JSONB NOT NULL,
        updated_at   TIMESTAMPTZ DEFAULT now(),
        UNIQUE (agent_id, thread_id)
    );
    CREATE INDEX IF NOT EXISTS working_memory_lookup_idx ON working_memory (agent_id, thread_id);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-migrate
  namespace: db
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:16
          command:
            - psql
            - -v
            - ON_ERROR_STOP=1
            - -f
            - /migrations/001_init.sql
          env:
            - name: PGHOST
              value: postgres.db.svc
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: postgres-migrations
