---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homebridge
  namespace: default
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: homebridge
      version: '5.3.2'
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: default
      interval: 5m
  values:
    replicaCount: 1
    image:
      # Chart default points at archived ghcr.io/oznu/homebridge (Node 18).
      # Switch to maintained official image (Ubuntu 24.04, current Node).
      repository: homebridge/homebridge
      tag: "2026-06-05"
    env:
      TZ: "Asia/Taipei"
    hostNetwork: true
    persistence:
      config:
        enabled: true
        type: pvc
        existingClaim: "homebridge-nfs"
#        storageClass: ds2-homedirect
#        subPath: "k8s_hb_mount"

