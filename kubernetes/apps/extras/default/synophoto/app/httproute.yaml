---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: synophoto
  namespace: default
spec:
  hostnames: ["synophoto.${SECRET_DOMAIN}"]
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: synophoto
          namespace: default
          port: 5001
      matches:
        - path:
            type: PathPrefix
            value: /
