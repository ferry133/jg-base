---
apiVersion: v1
kind: Secret
metadata:
  name: synophoto-secret
  namespace: linebot
stringData:
  FLASK_SECRET_KEY: "${SYNOPHOTO_FLASK_SECRET_KEY}"
  # Substituted from cluster-secrets (same key linebot uses); read by
  # progress_album.ClaudeJudge for stage-2 vision selection. Missing or
  # invalid value falls back to stage-1 only.
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
