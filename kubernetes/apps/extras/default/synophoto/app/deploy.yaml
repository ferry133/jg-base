---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synophoto
  namespace: linebot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: synophoto
  template:
    metadata:
      labels:
        app: synophoto
    spec:
      containers:
        - name: app
          image: ghcr.io/ferry133/synology-photo-tagger:latest@sha256:3cf4aa350698a3625b8ee9494be5b66731d9bb3dd04f6d2d3c3698cefc333089
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: synophoto-secret
          env:
            - name: LINEBOT_BASE_URL
              value: http://linebot-admin.linebot.svc.cluster.local:8081
            # Match linebot-admin's code defaults (it doesn't read these from a
            # secret either). If real creds get deployed via linebot-secret in
            # the future, change both sides at once.
            - name: LINEBOT_ADMIN_USER
              value: admin
            - name: LINEBOT_ADMIN_PASS
              value: changeme
            - name: PROGRESS_ALBUM_MODEL
              value: claude-haiku-4-5
            # showcase-album: vault dir (mounted PVC) + public base for the
            # guest URLs / per-photo thumbnail proxy embedded in markdown.
            - name: SHOWCASE_VAULT_DIR
              value: /app/showcase-vault
            - name: SHOWCASE_PUBLIC_BASE_URL
              value: https://synophoto.jiahd.cc
          volumeMounts:
            - name: sessions
              mountPath: /root/.syno_sessions
            - name: showcase-vault
              mountPath: /app/showcase-vault
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: sessions
          persistentVolumeClaim:
            claimName: synophoto-sessions
        - name: showcase-vault
          persistentVolumeClaim:
            claimName: synophoto-showcase-vault
---
apiVersion: v1
kind: Service
metadata:
  name: synophoto
  namespace: linebot
spec:
  selector:
    app: synophoto
  ports:
    - port: 5001
      targetPort: 5001
