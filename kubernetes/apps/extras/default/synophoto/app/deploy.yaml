---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synophoto
  namespace: linebot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: synophoto
  template:
    metadata:
      labels:
        app: synophoto
    spec:
      containers:
        - name: app
          image: ghcr.io/ferry133/synology-photo-tagger:latest@sha256:5f8759f67caadd5eb54d91e590b25573bbfcf3038fc9a95ef30567997313e5c4
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: synophoto-secret
          env:
            - name: LINEBOT_BASE_URL
              value: http://linebot-admin.linebot.svc.cluster.local:8081
            # Match linebot-admin's code defaults (it doesn't read these from a
            # secret either). If real creds get deployed via linebot-secret in
            # the future, change both sides at once.
            - name: LINEBOT_ADMIN_USER
              value: admin
            - name: LINEBOT_ADMIN_PASS
              value: changeme
          volumeMounts:
            - name: sessions
              mountPath: /root/.syno_sessions
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: sessions
          persistentVolumeClaim:
            claimName: synophoto-sessions
---
apiVersion: v1
kind: Service
metadata:
  name: synophoto
  namespace: linebot
spec:
  selector:
    app: synophoto
  ports:
    - port: 5001
      targetPort: 5001
